<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Space Radio Scanner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Space Radio Scanner</h1>

  <div id="channels">
    <button data-channel="civilian">Civilian</button>

    <p>Click a channel to receive a transmission.</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
